version: "3"

vars:
  BINARY_NAME: krait

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  build:
    desc: Build the binary
    cmds:
      - go build -ldflags="-s -w" -o dist/{{.BINARY_NAME}} ./cmd/krait/

  test:
    desc: Run tests with race detection and coverage
    cmds:
      - go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  fmt:
    desc: Format code
    cmds:
      - goimports -w -local github.com/krait-go/krait .

  tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  check:
    desc: Run all checks (lint + test + vet)
    deps: [lint, test, vet]

  snapshot:
    desc: Build a local release snapshot
    cmds:
      - goreleaser release --snapshot --clean

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf dist/ coverage.out

  dogfood:
    desc: Run krait on itself
    cmds:
      - go run ./cmd/krait/ check

  init:
    desc: Create .krait.json config
    cmds:
      - go run ./cmd/krait/ init
