version: "3"

vars:
  BINARY_NAME: krait

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  setup:
    desc: Install development tools and git hooks
    cmds:
      - go install mvdan.cc/gofumpt@latest
      - go install github.com/fzipp/gocyclo/cmd/gocyclo@latest
      - go install github.com/gitleaks/gitleaks/v8/cmd/gitleaks@latest
      - go install github.com/evilmartians/lefthook/v2@latest
      - lefthook install
      - echo "Setup complete. Git hooks installed."

  build:
    desc: Build the binary
    cmds:
      - go build -ldflags="-s -w" -o dist/{{.BINARY_NAME}} ./cmd/krait/

  test:
    desc: Run tests with race detection and coverage
    cmds:
      - go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  fmt:
    desc: Format code with gofumpt
    cmds:
      - gofumpt -l -w .

  tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  hooks:
    desc: Run all pre-commit checks manually
    cmds:
      - gofumpt -l -d .
      - golangci-lint run ./...
      - go mod tidy
      - go vet ./...
      - go build ./...

  check:
    desc: Run all checks (lint + test + vet)
    deps: [lint, test, vet]

  snapshot:
    desc: Build a local release snapshot
    cmds:
      - goreleaser release --snapshot --clean

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf dist/ coverage.out

  dogfood:
    desc: Run krait on itself
    cmds:
      - go run ./cmd/krait/ check

  init:
    desc: Create .krait.json config
    cmds:
      - go run ./cmd/krait/ init
