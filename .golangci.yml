version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - errcheck
    - errorlint
    - gosec
    - revive
    - gocritic
    - misspell
    - unconvert
    - unparam
    - whitespace
    - bodyclose
    - nilerr
    - noctx
    - durationcheck
    - makezero
    - gocyclo
    - gocognit
    - nestif
    - funlen
    - intrange

  settings:
    revive:
      rules:
        - name: exported
        - name: var-naming
        - name: error-strings
    gosec:
      excludes:
        - G304
    gocyclo:
      min-complexity: 15
    gocognit:
      min-complexity: 20
    funlen:
      lines: 100
      statements: 60
    nestif:
      min-complexity: 5

  exclusions:
    presets:
      - std-error-handling
      - common-false-positives
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - funlen
          - gocyclo
          - gocognit
          - gosec

formatters:
  enable:
    - goimports
    - gofumpt
  settings:
    goimports:
      local-prefixes:
        - github.com/krait-go/krait
    gofumpt:
      extra-rules: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
