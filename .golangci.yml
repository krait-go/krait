run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - errorlint
    - gosec
    - revive
    - gocritic
    - goimports
    - unconvert
    - unparam
    - whitespace
    - misspell

linters-settings:
  goimports:
    local-prefixes: github.com/krait-go/krait
  revive:
    rules:
      - name: exported
      - name: var-naming
      - name: error-strings
  gosec:
    excludes:
      - G304

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - errcheck

  max-issues-per-linter: 0
  max-same-issues: 0
